<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOKB-OS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 4px;
      color: #38bdf8;
    }
    p.sub {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #f1f5f9;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
    }
    textarea { height: 100px; resize: none; }
    button {
      width: 100%;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 20px;
      background: #0f172a;
      border-radius: 8px;
      padding: 16px;
      font-size: 0.85rem;
      color: #94a3b8;
      display: none;
    }
    .result.show { display: block; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🤖 DOKB-OS</h1>
    <p class="sub">AI Orchestration System</p>

    <label>Task ID</label>
    <input id="taskId" type="text" placeholder="Contoh: task-001" />

    <label>Judul Task</label>
    <input id="taskTitle" type="text" placeholder="Contoh: Buat sistem anggota" />

    <label>Deskripsi Task</label>
    <textarea id="taskPayload" placeholder="Jelaskan task yang ingin dikerjakan..."></textarea>

    <button id="btnRun" onclick="runWorkflow()">🚀 Jalankan Workflow</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    async function runWorkflow() {
      const id = document.getElementById("taskId").value.trim();
      const title = document.getElementById("taskTitle").value.trim();
      const payload = document.getElementById("taskPayload").value.trim();
      const btn = document.getElementById("btnRun");
      const result = document.getElementById("result");

      if (!id || !title || !payload) {
        result.className = "result show error";
        result.textContent = "⚠️ Semua field wajib diisi!";
        return;
      }

      btn.disabled = true;
      btn.textContent = "⏳ Memproses...";
      result.className = "result show";
      result.textContent = "🔄 Menjalankan workflow...";

      try {
        const res = await fetch("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, title, payload }),
        });

        const data = await res.json();

        if (data.success) {
          result.className = "result show success";
          result.textContent = `✅ ${data.message}`;
        } else {
          result.className = "result show error";
          result.textContent = `❌ Error: ${data.error}`;
        }
      } catch (err) {
        result.className = "result show error";
        result.textContent = `❌ Gagal konek ke server!`;
      } finally {
        btn.disabled = false;
        btn.textContent = "🚀 Jalankan Workflow";
      }
    }
  </script>
</body>
</html>
